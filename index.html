<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta property="og:title" content="국회의원 궁디팡팡">
<meta property="og:description" content="국민의 마음을 담아 한 대 때려드립니다">
<title>국회의원 궁디팡팡</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
  :root {
    --scold: #E24B4A;
    --praise: #1D9E75;
    --bg: #FFF8F0;
    --text: #2C1A0E;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family:'Nanum Gothic',sans-serif;
    background:var(--bg);
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    overflow-x:hidden;
  }
  header {
    width:100%;
    padding:20px 16px 0;
    text-align:center;
  }
  h1 {
    font-family:'Black Han Sans',sans-serif;
    font-size:clamp(26px,8vw,46px);
    color:var(--text);
    letter-spacing:-1px;
    line-height:1.1;
  }
  h1 span { color:var(--scold); }
  .subtitle { font-size:13px; color:#888; margin-top:4px; }

  .mode-wrap {
    display:flex; gap:10px;
    margin:18px 0 0;
    padding:0 16px;
    width:100%; max-width:400px;
  }
  .mode-btn {
    flex:1; padding:13px 8px;
    border-radius:16px;
    border:2.5px solid #ddd;
    background:white;
    font-family:'Black Han Sans',sans-serif;
    font-size:18px;
    cursor:pointer;
    transition:all 0.18s cubic-bezier(0.34,1.56,0.64,1);
    color:#aaa;
  }
  .mode-btn.active-scold {
    border-color:var(--scold); background:#fff0f0; color:var(--scold);
    transform:scale(1.04); box-shadow:0 4px 20px rgba(226,75,74,0.2);
  }
  .mode-btn.active-praise {
    border-color:var(--praise); background:#f0fdf6; color:var(--praise);
    transform:scale(1.04); box-shadow:0 4px 20px rgba(29,158,117,0.2);
  }

  .stage {
    position:relative;
    width:min(320px,88vw);
    height:min(320px,88vw);
    margin:14px auto 0;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    -webkit-user-select:none; user-select:none;
  }
  .char-img {
    width:100%; height:100%; object-fit:contain;
    position:relative; z-index:2;
    transition:transform 0.08s;
    -webkit-user-drag:none; pointer-events:none;
  }
  .stage:active .char-img { transform:scale(0.96) rotate(-1deg); }

  .butt-glow {
    position:absolute;
    width:44%; height:38%;
    border-radius:50%;
    top:40%; left:26%;
    z-index:1; pointer-events:none;
    opacity:0;
    background:radial-gradient(ellipse,rgba(226,75,74,0.65) 0%,rgba(226,75,74,0) 70%);
    transition:opacity 0.25s;
  }
  .butt-glow.on {
    opacity:1;
    animation:throb 0.4s ease-out;
  }
  @keyframes throb {
    0%   { transform:scale(0.5); opacity:0; }
    60%  { transform:scale(1.2); opacity:1; }
    100% { transform:scale(1); opacity:1; }
  }

  /* 말풍선 */
  .speech-bubble {
    position:absolute;
    top:8%;
    left:50%;
    transform:translateX(-20%);
    background:white;
    border:2.5px solid var(--scold);
    border-radius:18px 18px 18px 4px;
    padding:8px 14px;
    font-family:'Black Han Sans',sans-serif;
    font-size:clamp(13px,3.5vw,16px);
    color:var(--scold);
    white-space:nowrap;
    z-index:15;
    pointer-events:none;
    animation:bubblePop 1.2s ease-out forwards;
    box-shadow:0 3px 12px rgba(226,75,74,0.2);
  }
  .speech-bubble::after {
    content:'';
    position:absolute;
    bottom:-10px; left:14px;
    width:0; height:0;
    border-left:8px solid transparent;
    border-right:4px solid transparent;
    border-top:10px solid var(--scold);
  }
  .speech-bubble.praise-bubble {
    border-color:var(--praise);
    color:var(--praise);
    border-radius:18px 18px 18px 4px;
    box-shadow:0 3px 12px rgba(29,158,117,0.2);
  }
  .speech-bubble.praise-bubble::after {
    border-top-color:var(--praise);
  }
  @keyframes bubblePop {
    0%   { opacity:0; transform:translateX(-20%) scale(0.7); }
    15%  { opacity:1; transform:translateX(-20%) scale(1.05); }
    25%  { transform:translateX(-20%) scale(1); }
    75%  { opacity:1; transform:translateX(-20%) scale(1); }
    100% { opacity:0; transform:translateX(-20%) scale(0.95) translateY(-10px); }
  }

  .fx-layer {
    position:absolute; inset:0;
    pointer-events:none; z-index:20; overflow:hidden;
  }
  .fx-word {
    position:absolute;
    font-family:'Black Han Sans',sans-serif;
    font-size:clamp(15px,4.5vw,20px);
    pointer-events:none; white-space:nowrap;
    animation:wordPop 0.9s ease-out forwards;
  }
  @keyframes wordPop {
    0%   { opacity:1; transform:translateY(0) scale(0.6) rotate(var(--rot)); }
    30%  { opacity:1; transform:translateY(-18px) scale(1.1) rotate(var(--rot)); }
    100% { opacity:0; transform:translateY(-75px) scale(0.9) rotate(var(--rot)); }
  }
  .star-particle {
    position:absolute;
    width:9px; height:9px;
    border-radius:50%;
    pointer-events:none;
    animation:starBurst 0.65s ease-out forwards;
  }
  @keyframes starBurst {
    0%   { opacity:1; transform:scale(0) translate(0,0); }
    100% { opacity:0; transform:scale(1) translate(var(--dx),var(--dy)); }
  }

  .hint {
    margin-top:6px;
    font-size:13px; color:#aaa; text-align:center;
    animation:pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

  .mode-label {
    margin-top:4px;
    font-family:'Black Han Sans',sans-serif;
    font-size:14px; text-align:center;
  }

  .count-wrap {
    display:flex; gap:16px;
    margin-top:14px;
  }
  .count-box {
    text-align:center; background:white;
    border-radius:14px; padding:10px 20px;
    box-shadow:0 2px 12px rgba(0,0,0,0.07);
    min-width:90px;
  }
  .count-box .num {
    font-family:'Black Han Sans',sans-serif;
    font-size:26px; display:block;
  }
  .count-box .lbl { font-size:11px; color:#aaa; margin-top:1px; }
  .scold-box .num { color:var(--scold); }
  .praise-box .num { color:var(--praise); }

  /* 공유 버튼 */
  .share-wrap {
    display:flex; gap:10px;
    margin-top:16px; margin-bottom:32px;
    padding:0 16px; width:100%; max-width:400px;
  }
  .share-btn {
    flex:1; padding:13px 8px;
    border-radius:14px; border:none;
    font-family:'Black Han Sans',sans-serif;
    font-size:15px; cursor:pointer;
    transition:transform 0.12s, box-shadow 0.12s;
  }
  .share-btn:active { transform:scale(0.96); }
  .share-kakao {
    background:#FEE500; color:#391B1B;
    box-shadow:0 3px 12px rgba(254,229,0,0.4);
  }
  .share-copy {
    background:#2C1A0E; color:white;
    box-shadow:0 3px 12px rgba(44,26,14,0.2);
  }
  .share-native {
    background:var(--scold); color:white;
    box-shadow:0 3px 12px rgba(226,75,74,0.3);
  }

  /* 토스트 */
  .toast {
    position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
    background:#2C1A0E; color:white;
    font-family:'Black Han Sans',sans-serif;
    font-size:14px; padding:12px 24px;
    border-radius:40px;
    opacity:0; pointer-events:none;
    transition:opacity 0.3s;
    white-space:nowrap; z-index:999;
  }
  .toast.show { opacity:1; }
</style>
</head>

const scoldFx    = ['때치!!!','혼나야대!!','반성해!!','이게 뭐야!!','아야!!!','정신차려!!','국민이 화났다!!'];
const praiseFx   = ['칭찬해~','일 잘해~','최고야~','굿굿~','잘했어~','착해~','역시~'];
const scoldSpeech = ['더 잘할게요ㅠㅠ','잘못했습니다ㅠ','앞으로 잘할게요','으앙 아파요ㅠ','죄송합니다ㅜ','반성할게요ㅠ'];
const praiseSpeech = ['감사합니다~','열심히 하겠습니다!','뿌듯해요 ㅎㅎ','앞으로도 잘할게요!'];

let mode = 'scold';
let resetTimer = null;
let scoldCnt = 0, praiseCnt = 0;

const charImg    = document.getElementById('charImg');
const buttGlow   = document.getElementById('buttGlow');
const fxLayer    = document.getElementById('fxLayer');
const modeLabel  = document.getElementById('modeLabel');
const btnScold   = document.getElementById('btnScold');
const btnPraise  = document.getElementById('btnPraise');
const scoldCount = document.getElementById('scoldCount');
const praiseCount= document.getElementById('praiseCount');
const stage      = document.getElementById('stage');

function setMode(m) {
  mode = m;
  charImg.src = IDLE;
  buttGlow.className = 'butt-glow';
  if (m === 'scold') {
    btnScold.className  = 'mode-btn active-scold';
    btnPraise.className = 'mode-btn';
    modeLabel.style.color = 'var(--scold)';
    modeLabel.textContent = '혼내기 모드';
  } else {
    btnScold.className  = 'mode-btn';
    btnPraise.className = 'mode-btn active-praise';
    modeLabel.style.color = 'var(--praise)';
    modeLabel.textContent = '칭찬하기 모드';
  }
}

function handleTap(e) {
  e.preventDefault();
  const isScold = mode === 'scold';
  const color   = isScold ? '#E24B4A' : '#1D9E75';
  const fxWords = isScold ? scoldFx : praiseFx;
  const speeches = isScold ? scoldSpeech : praiseSpeech;

  charImg.src = isScold ? SCOLD : PRAISE;

  if (isScold) {
    buttGlow.className = 'butt-glow on';
    scoldCnt++;
    scoldCount.textContent = scoldCnt;
  } else {
    buttGlow.className = 'butt-glow';
    praiseCnt++;
    praiseCount.textContent = praiseCnt;
  }

  const touch = e.touches ? e.touches[0] : e;
  const rect  = fxLayer.getBoundingClientRect();
  const cx = touch.clientX - rect.left;
  const cy = touch.clientY - rect.top;

  // 말풍선
  const bubble = document.createElement('div');
  bubble.className = isScold ? 'speech-bubble' : 'speech-bubble praise-bubble';
  bubble.textContent = speeches[Math.floor(Math.random() * speeches.length)];
  stage.appendChild(bubble);
  setTimeout(() => bubble.remove(), 1250);

  // 텍스트 파티클
  for (let i = 0; i < 3; i++) {
    const w = document.createElement('div');
    w.className = 'fx-word';
    w.textContent = fxWords[Math.floor(Math.random() * fxWords.length)];
    w.style.color = color;
    w.style.setProperty('--rot', (Math.random()*22-11)+'deg');
    w.style.left = (cx + (Math.random()-0.5)*110 - 50) + 'px';
    w.style.top  = (cy + (Math.random()-0.5)*55 - 14) + 'px';
    fxLayer.appendChild(w);
    setTimeout(() => w.remove(), 950);
  }

  // 별 파티클
  for (let i = 0; i < 7; i++) {
    const s = document.createElement('div');
    s.className = 'star-particle';
    s.style.background = color;
    s.style.left = cx + 'px';
    s.style.top  = cy + 'px';
    const angle = (i/7)*Math.PI*2 + Math.random()*0.4;
    const dist  = 35 + Math.random()*35;
    s.style.setProperty('--dx', Math.cos(angle)*dist+'px');
    s.style.setProperty('--dy', Math.sin(angle)*dist+'px');
    fxLayer.appendChild(s);
    setTimeout(() => s.remove(), 700);
  }

  if (resetTimer) clearTimeout(resetTimer);
  resetTimer = setTimeout(() => {
    charImg.src = IDLE;
    buttGlow.className = 'butt-glow';
  }, 850);
}

stage.addEventListener('click', handleTap);
stage.addEventListener('touchstart', handleTap, {passive:false});

// 공유 기능
const SHARE_URL  = window.location.href;
const SHARE_TEXT = '국회의원 궁디팡팡 🍑 나도 한 대 때려봐!';

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function shareNative() {
  if (navigator.share) {
    navigator.share({ title:'국회의원 궁디팡팡', text:SHARE_TEXT, url:SHARE_URL })
      .catch(() => {});
  } else {
    copyLink();
  }
}

function shareKakao() {
  const kakaoUrl = 'https://sharer.kakao.com/talk/friends/picker/link?app_key=DEMO&link_ver=4.0&template_id=0&template_args=' +
    encodeURIComponent(JSON.stringify({url: SHARE_URL}));
  const msg = encodeURIComponent(SHARE_TEXT + '\n' + SHARE_URL);
  window.open('https://story.kakao.com/share?url=' + encodeURIComponent(SHARE_URL), '_blank', 'width=500,height=400');
  showToast('카카오스토리 공유 창이 열렸어요!');
}

function copyLink() {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(SHARE_URL).then(() => showToast('링크가 복사됐어요!'));
  } else {
    const el = document.createElement('textarea');
    el.value = SHARE_URL;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    showToast('링크가 복사됐어요!');
  }
}
